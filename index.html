<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ColmadoApp</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#2e7d32;
color:white;
text-align:center;
padding:20px;
}

.productos{
display:flex;
gap:15px;
overflow-x:auto;
padding:20px;
}

.producto{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
min-width:120px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

button{
background:#25D366;
border:none;
color:white;
padding:10px;
border-radius:8px;
}

</style>
</head>

<body>

<header>
<h2>ColmadoApp</h2>
  
<p>Pide desde tu celular</p>
</header>

<div class="productos">

<div class="producto">
<h3>Arroz</h3>
<p>RD$60</p>
<button onclick="pedir('Arroz')">Pedir</button>
</div>

<div class="producto">
<h3>Azúcar</h3>
<p>RD$70</p>
<button onclick="pedir('Azúcar')">Pedir</button>
</div>

<div class="producto">
<h3>Leche</h3>
<p>RD$80</p>
<button onclick="pedir('Leche')">Pedir</button>
</div>

<div class="producto">
<h3>Huevo</h3>
<p>RD$10</p>
<button onclick="pedir('Huevo')">Pedir</button>
</div>

</div>

<script>

function pedir(producto){

let mensaje="Hola quiero pedir "+producto;

window.open("https://wa.me/18298260038?text="+mensaje)

}

</script>

</body>
</html>
